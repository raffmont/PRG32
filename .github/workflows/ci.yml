name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
      - name: Basic structure check
        run: |
          test -d components/prg32
          test -d examples
          test -f tools/prg32_game.py
      - name: Smoke test (best effort)
        run: |
          if [ -f scripts/smoke_test.sh ]; then
            bash scripts/smoke_test.sh || echo "Smoke test failed (non-blocking)";
          else
            echo "No smoke test script found";
          fi
